<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enonic UI Preview</title>
    <link rel="stylesheet" href="./dist/style.css" />
  </head>
  <body>
    <h1>Enonic UI Preview</h1>
    <div id="app"></div>

    <script type="importmap">
      {
        "imports": {
          "preact": "./node_modules/preact/dist/preact.module.js",
          "preact/hooks": "./node_modules/preact/hooks/dist/hooks.module.js"
        }
      }
    </script>
    <script type="module">
      import { h, render } from 'preact';

      import { Button } from './dist/enonic-ui.es.js';

      render(h(Button, { variant: 'primary', label: 'Click me' }), document.getElementById('app'));
    </script>
  </body>
</html>
