name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  precheck:
    name: Verify tag points to main/master
    runs-on: ubuntu-latest
    outputs:
      on_main_or_master: ${{ steps.contains.outputs.on_main_or_master }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag commit is contained in main/master
        id: contains
        run: |
          git fetch --quiet origin main master || true
          if git branch -r --contains "${GITHUB_SHA}" | grep -Eq 'origin/(main|master)'; then
            echo "on_main_or_master=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_main_or_master=false" >> "$GITHUB_OUTPUT"
          fi

  npm-publish:
    name: Publish to NPM
    needs: precheck
    if: needs.precheck.outputs.on_main_or_master == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Publish
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Enonic UI ${{ github.ref_name }}
