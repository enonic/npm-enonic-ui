name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  precheck:
    name: Verify tag points to main/master or version branches (x.y)
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.contains.outputs.allowed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag commit is in allowed branches
        id: contains
        shell: bash
        run: |
          git fetch --quiet origin '+refs/heads/*:refs/remotes/origin/*' || true

          contains="$(git branch -r --contains "${GITHUB_SHA}" | sed 's/^[ *]*//')"

          echo "Branches containing the tag commit:"
          echo "${contains}"

          if echo "${contains}" | grep -Eq '^origin/(main|master|[0-9]+\.[0-9]+)$'; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
          fi

  npm-publish:
    name: Publish to NPM
    needs: precheck
    if: needs.precheck.outputs.allowed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag/version mismatch: tag=$tag_version package.json=$pkg_version"
            exit 1
          fi
          echo "Tag and package.json version match: $pkg_version"

      - name: Publish
        # --no-git-checks: CI runs in detached HEAD state (tag checkout)
        # --provenance: signed sigstore attestation via OIDC (id-token: write)
        # --tag: pre-release tags (containing '-') publish to 'beta' dist-tag,
        #        stable tags publish to 'latest'
        run: pnpm publish --no-git-checks --provenance --tag ${{ contains(github.ref_name, '-') && 'beta' || 'latest' }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Enonic UI ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
