version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    assignees:
      - 'edloidas'
    reviewers:
      - 'edloidas'
    groups:
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
          - '@chromatic-com/*'
        update-types:
          - 'minor'
          - 'patch'
      vite:
        patterns:
          - 'vite'
          - 'vite-plus'
          - 'vite-plugin-*'
          - '@preact/preset-vite'
          - 'rollup-plugin-*'
          - 'terser'
          - 'postcss'
        update-types:
          - 'minor'
          - 'patch'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'tw-animate-css'
        update-types:
          - 'minor'
          - 'patch'
      lucide:
        patterns:
          - 'lucide-*'
        update-types:
          - 'minor'
          - 'patch'
      types:
        patterns:
          - '@types/*'
        update-types:
          - 'minor'
          - 'patch'
      size-limit:
        patterns:
          - 'size-limit'
          - '@size-limit/*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 10
    assignees:
      - 'edloidas'
    reviewers:
      - 'edloidas'
    groups:
      actions:
        patterns:
          - '*'
        update-types:
          - 'major'
          - 'minor'
          - 'patch'
