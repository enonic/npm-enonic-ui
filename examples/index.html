<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enonic UI - Examples</title>
    <link rel="stylesheet" href="../dist/styles/style.css" />
    <style>
      body {
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .example-section {
        margin-bottom: 3rem;
      }
      .example-section h2 {
        margin-bottom: 1rem;
        font-size: 1.5rem;
        font-weight: 600;
      }
      .example-grid {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: 1rem;
      }
      .example-description {
        font-size: 0.875rem;
        color: #666;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>Enonic UI Component Library - Examples</h1>
    <p>Live examples of all components from the built library.</p>

    <div class="example-section">
      <h2>Buttons</h2>
      <p class="example-description">Different button variants and sizes</p>
      <div id="buttons" class="example-grid"></div>
    </div>

    <div class="example-section">
      <h2>Icon Buttons</h2>
      <p class="example-description">Icon-only buttons in different styles</p>
      <div id="icon-buttons" class="example-grid"></div>
    </div>

    <div class="example-section">
      <h2>Inputs</h2>
      <p class="example-description">Form inputs with various states</p>
      <div
        id="inputs"
        class="example-grid"
        style="flex-direction: column; align-items: stretch; max-width: 400px"
      ></div>
    </div>

    <!-- Keep react and react-dom for compatibility, since we render with preact -->
    <script type="importmap">
      {
        "imports": {
          "preact": "../node_modules/preact/dist/preact.module.js",
          "preact/hooks": "../node_modules/preact/hooks/dist/hooks.module.js",
          "preact/compat": "../node_modules/preact/compat/dist/compat.module.js",
          "react": "../node_modules/preact/compat/dist/compat.module.js",
          "react-dom": "../node_modules/preact/compat/dist/compat.module.js"
        }
      }
    </script>
    <script type="module">
      import { h, render } from 'preact';

      import { Button, IconButton, Input } from '../dist/enonic-ui.es.js';

      // Custom SVGs for some icons
      const ChevronRight = () =>
        h(
          'svg',
          {
            width: 18,
            height: 18,
            viewBox: '0 0 24 24',
            fill: 'none',
            stroke: 'currentColor',
            strokeWidth: 2,
            strokeLinecap: 'round',
            strokeLinejoin: 'round',
          },
          h('polyline', { points: '9 18 15 12 9 6' }),
        );

      const Search = () =>
        h(
          'svg',
          {
            width: 18,
            height: 18,
            viewBox: '0 0 24 24',
            fill: 'none',
            stroke: 'currentColor',
            strokeWidth: 2,
            strokeLinecap: 'round',
            strokeLinejoin: 'round',
          },
          [h('circle', { cx: 11, cy: 11, r: 8 }), h('path', { d: 'm21 21-4.35-4.35' })],
        );

      // Button examples
      const buttonVariants = ['text', 'filled', 'solid', 'outline'];
      const buttonSizes = ['sm', 'md', 'lg'];

      const buttonExamples = [];
      buttonVariants.forEach(variant => {
        buttonSizes.forEach(size => {
          buttonExamples.push(
            h(Button, {
              variant,
              size,
              label: `${variant} ${size}`,
              endIcon: variant === 'solid' ? ChevronRight : null,
            }),
          );
        });
      });

      render(
        h('div', { style: 'display: flex; gap: 1rem; flex-wrap: wrap;' }, buttonExamples),
        document.getElementById('buttons'),
      );

      // Icon Button examples
      const iconButtonExamples = [];
      buttonVariants.forEach(variant => {
        buttonSizes.forEach(size => {
          iconButtonExamples.push(
            h(IconButton, {
              variant,
              size,
              icon: Search,
              title: `${variant} ${size} icon button`,
            }),
          );
        });
      });

      render(
        h('div', { style: 'display: flex; gap: 1rem; flex-wrap: wrap;' }, iconButtonExamples),
        document.getElementById('icon-buttons'),
      );

      // Input examples
      const inputExamples = [
        h(Input, {
          label: 'Default Input',
          placeholder: 'Enter text...',
          description: 'This is a helper text',
        }),
        h(Input, {
          label: 'Input with Error',
          placeholder: 'Enter email...',
          error: 'Please enter a valid email address',
          defaultValue: 'invalid-email',
        }),
        h(Input, {
          label: 'Disabled Input',
          placeholder: 'Cannot edit...',
          disabled: true,
          defaultValue: 'Disabled value',
        }),
        h(Input, {
          label: 'Read-only Input',
          readOnly: true,
          defaultValue: 'Read-only value',
        }),
        h(Input, {
          label: 'Input with Addons',
          placeholder: 'Search...',
          startAddon: 'https://',
          endAddon: '.com',
        }),
      ];

      inputExamples.forEach((input, index) => {
        const wrapper = document.createElement('div');
        wrapper.style.marginBottom = '1.5rem';
        document.getElementById('inputs').appendChild(wrapper);
        render(input, wrapper);
      });
    </script>
  </body>
</html>
